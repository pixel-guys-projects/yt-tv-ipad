name: Build IPA from SwiftPM
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Dependencies
        run: swift package resolve

      - name: Compile and Archive App Package
        run: |
          xcodebuild archive \
            -packagePath . \
            -scheme "YouTubeTVApp" \
            -destination "generic/platform=iOS" \
            -archivePath "./build/App.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package App Bundle into IPA
        run: |
          mkdir -p Payload
          # Automatically finds the compiled .app wherever Xcode drops it inside the archive
          find ./build/App.xcarchive -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r YouTubeTVApp.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTVApp-Package
          path: YouTubeTVApp.ipa
