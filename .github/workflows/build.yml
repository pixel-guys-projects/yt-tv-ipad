name: Build IPA from SwiftPM
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Compile Native iPadOS Binary
        run: |
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            --sdk $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Assemble Application Bundle and Info.plist
        run: |
          # Create the official iOS/iPadOS directory payload structure
          mkdir -p Payload/YouTubeTVApp.app
          
          # Loosen search to cleanly locate the built binary anywhere inside the build tree
          TARGET_BIN=$(find .build -type f -name "yt-tv-ipad" -o -name "YouTubeTVApp" | head -n 1)
          
          # If specific name checks fall short, pull the first pure executable out of the release tree
          if [ -z "$TARGET_BIN" ]; then
            TARGET_BIN=$(find .build/ -type f ! -name "*.plist" ! -name "*.json" ! -name "*.db" ! -name "*.txt" ! -name "*.nib" ! -name "*.plist" | head -n 1)
          fi
          
          cp "$TARGET_BIN" Payload/YouTubeTVApp.app/YouTubeTVApp
          chmod +x Payload/YouTubeTVApp.app/YouTubeTVApp

          # Write clean layout plist configurations
          cat <<EOF > Payload/YouTubeTVApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>YouTubeTVApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.pixelguys.yttvipad</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>YouTube TV</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>2</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Package App Bundle into IPA
        run: |
          zip -r YouTubeTVApp.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTVApp-Package
          path: YouTubeTVApp.ipa
