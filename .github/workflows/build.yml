name: Build IPA from SwiftPM
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Compile App Bundle via xcodebuild
        run: |
          xcodebuild build \
            -packagePath . \
            -scheme "YouTubeTVApp" \
            -destination "generic/platform=iOS" \
            -derivedDataPath "./build" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package App Bundle into IPA
        run: |
          mkdir -p Payload
          # Locate the built .app package out of the clean xcodebuild directory
          find ./build -name "*.app" -exec cp -r {} ./Payload/ \; 2>/dev/null || true
          
          # Bundle the Payload folder into the installable IPA file
          zip -r YouTubeTVApp.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTVApp-Package
          path: YouTubeTVApp.ipa
