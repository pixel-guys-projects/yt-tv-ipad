name: Build IPA from SwiftPM
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Compile Swift App Target
        run: |
          swift build -c release --triple arm64-apple-ios17.0

      - name: Package App Bundle into IPA
        run: |
          mkdir -p Payload
          # Locate the freshly generated .app bundle product directory inside the build cache
          find .build -name "*.app" -exec cp -r {} ./Payload/ \; 2>/dev/null || true
          
          # Fallback check if compiled alternative paths are targeted
          if [ -z "$(ls -A Payload)" ]; then
            find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -exec cp -r {} ./Payload/ \; 2>/dev/null || true
          fi
          
          zip -r YouTubeTVApp.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTVApp-Package
          path: YouTubeTVApp.ipa
