name: Build IPA from SwiftPM
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Compile Native iOS Binary with iOS SDK
        run: |
          # Pass the explicit iOS SDK path directly into the compiler toolchain
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path)

      - name: Assemble Application Bundle and Info.plist
        run: |
          # Create the official iOS directory payload structure
          mkdir -p Payload/YouTubeTVApp.app
          
          # Move the compiled executable binary into place
          cp .build/arm64-apple-ios17.0/release/YouTubeTVApp Payload/YouTubeTVApp.app/YouTubeTVApp
          
          # Dynamically write a valid configuration plist file for iOS recognition
          cat <<EOF > Payload/YouTubeTVApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>YouTubeTVApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.pixelguys.yttvipad</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>YouTube TV</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Package App Bundle into IPA
        run: |
          zip -r YouTubeTVApp.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTVApp-Package
          path: YouTubeTVApp.ipa
